<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Nós Dois 💜</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- CHUVA DE CORAÇÕES -->
  <div class="heart-rain"></div>

  <!-- MÚSICA -->
  <audio autoplay loop controls id="music">
    <source src="musica.mp3" type="audio/mpeg">
  </audio>

  <!-- HERO -->
  <section class="hero">

    <h1>💜 Nossa História 💜</h1>

    <p>
      Cada momento ao seu lado virou minha lembrança favorita.
    </p>

  </section>

  <!-- CONTADOR -->
  <section class="contador">

    <h2>💜 Estamos juntos há 💜</h2>

    <div id="timer">
      Carregando...
    </div>

  </section>

  <!-- GALERIA -->
  <section class="gallery">

    <div class="card">
      <img src="foto1.jpg" alt="Foto 1">
    </div>

    <div class="card">
      <img src="foto2.jpg" alt="Foto 2">
    </div>

    <div class="card">
      <img src="foto3.jpg" alt="Foto 3">
    </div>

  </section>

  <!-- MENSAGEM -->
  <section class="message">

    <h2>Para você 💌</h2>

    <p>
      Obrigado por existir na minha vida.
      Você transforma dias simples em momentos inesquecíveis.
      Esse site é só um pedacinho do quanto eu amo você 💜
    </p>

  </section>

  <!-- FOOTER -->
  <footer>
    Feito com amor ✨
  </footer>

  <!-- SCRIPT CONTADOR -->
  <script>

    const dataNamoro = new Date("2026-04-03 00:00:00");

    function atualizarContador() {

      const agora = new Date();

      const diferenca = agora - dataNamoro;

      const dias = Math.floor(
        diferenca / (1000 * 60 * 60 * 24)
      );

      const horas = Math.floor(
        (diferenca / (1000 * 60 * 60)) % 24
      );

      const minutos = Math.floor(
        (diferenca / (1000 * 60)) % 60
      );

      const segundos = Math.floor(
        (diferenca / 1000) % 60
      );

      document.getElementById("timer").innerHTML =
        `${dias} dias 💜 ${horas}h ${minutos}m ${segundos}s`;

    }

    setInterval(atualizarContador, 1000);

    atualizarContador();

  </script>

</body>

</html>
